<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Študentské plagáty — AR</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }

      #ui {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        font-family: system-ui, sans-serif;
        z-index: 10;
        text-align: center;
        padding: 20px;
      }
      #ui h1 {
        font-size: 1.4rem;
        margin-bottom: 0.5rem;
      }
      #ui p {
        font-size: 0.9rem;
        opacity: 0.7;
        max-width: 400px;
        line-height: 1.5;
      }
      #startBtn {
        margin-top: 1.5rem;
        padding: 14px 32px;
        font-size: 1rem;
        border: none;
        border-radius: 50px;
        background: #6c5ce7;
        color: white;
        cursor: pointer;
      }
      #startBtn:active {
        transform: scale(0.97);
      }
      #hint {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-family: system-ui, sans-serif;
        font-size: 0.85rem;
        opacity: 0.7;
        z-index: 5;
        text-align: center;
        pointer-events: none;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1>Študentské plagáty — AR</h1>
      <p>Namiertte kameru na plagát na stene a uvidíte animáciu.</p>
      <button id="startBtn">Spustiť AR</button>
    </div>
    <div id="hint" class="hidden">Namiertte na plagát →</div>

    <!-- Zappar + Three.js cez CDN -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@zappar/zappar-threejs"></script>

    <script src="main.js"></script>
  </body>
</html>
